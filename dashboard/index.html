<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <!-- Disable caching for additional security -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="format-detection" content="telephone=no, email=no">
  <title>ViPeR Hub | Secure Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Allow selection inside input fields, textareas for usability */
    input, textarea, [contenteditable="true"] {
      user-select: text !important;
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      -ms-user-select: text !important;
    }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.2s ease, color 0.2s ease;
      background: #0f172a;
      color: #e2e8f0;
      visibility: visible;
    }

    /* Light mode overrides */
    body.light {
      background: #f4f7fc;
      color: #1a2634;
    }

    .app-container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* ---------- SIDEBAR ---------- */
    .sidebar {
      width: 280px;
      background: #ffffff;
      border-right: 1px solid #e6edf4;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      transition: width 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1), background 0.2s, border-color 0.2s;
      overflow-x: hidden;
      z-index: 20;
      flex-shrink: 0;
    }

    body.dark .sidebar {
      background: #1e293b;
      border-right-color: #334155;
    }

    .sidebar.collapsed {
      width: 88px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding: 0 8px;
    }

    .logo-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }

    .logo-icon {
      background: #3b82f6;
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: white;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
    }

    .logo-text img {
      max-width: 120px;
      height: auto;
    }

    body.dark .logo-text {
      background: linear-gradient(135deg, #60a5fa, #818cf8);
    }

    .sidebar.collapsed .logo-text {
      opacity: 0;
      width: 0;
      display: none;
    }

    .toggle-sidebar-btn {
      background: #eff3f8;
      border: none;
      border-radius: 30px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2c4f6e;
      font-size: 1.2rem;
      transition: 0.2s;
      flex-shrink: 0;
    }

    body.dark .toggle-sidebar-btn {
      background: #334155;
      color: #cbd5e1;
    }

    .toggle-sidebar-btn:hover {
      background: #e2e8f0;
      color: #2563eb;
    }

    body.dark .toggle-sidebar-btn:hover {
      background: #475569;
      color: #60a5fa;
    }

    .nav-menu {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-radius: 18px;
      font-weight: 500;
      font-size: 0.95rem;
      color: #2c3e4f;
      transition: all 0.2s ease;
      cursor: pointer;
      white-space: nowrap;
    }

    body.dark .nav-item {
      color: #cbd5e1;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.2rem;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-item span {
      transition: opacity 0.2s;
    }

    .sidebar.collapsed .nav-item span {
      opacity: 0;
      width: 0;
      display: none;
    }

    .nav-item:hover {
      background: #eff3f8;
      color: #1e40af;
    }

    body.dark .nav-item:hover {
      background: #334155;
      color: #60a5fa;
    }

    .nav-item.active {
      background: #eef2ff;
      color: #2563eb;
      font-weight: 600;
    }

    body.dark .nav-item.active {
      background: #2563eb20;
      color: #60a5fa;
    }

    .nav-item.placeholder {
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
    }

    body.dark .nav-item.placeholder {
      opacity: 0.5;
    }

    .account-panel {
      margin-top: auto;
      padding: 1rem 0.5rem 0.8rem;
      border-top: 1px solid #eef2f8;
    }

    body.dark .account-panel {
      border-top-color: #334155;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .user-avatar {
      background: #2563eb;
      width: 42px;
      height: 42px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.1rem;
      color: white;
      flex-shrink: 0;
    }

    .user-details {
      overflow: hidden;
      transition: 0.2s;
    }

    .user-details h4 {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .user-details p {
      font-size: 0.7rem;
      color: #5f7f9c;
    }

    body.dark .user-details p {
      color: #94a3b8;
    }

    .sidebar.collapsed .user-details {
      opacity: 0;
      width: 0;
      display: none;
    }

    .sync-status {
      font-size: 0.7rem;
      color: #8ba0b0;
      margin-top: 12px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    body.dark .sync-status {
      color: #64748b;
    }

    /* ---------- MAIN PANEL ---------- */
    .main-panel {
      flex: 1;
      position: relative;
      overflow-y: auto;
      background: inherit;
    }

    .theme-toggle-wrapper {
      position: absolute;
      top: 16px;
      right: 24px;
      z-index: 99;
      margin: 0;
    }

    .theme-toggle {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      border: 1px solid #e2e8f0;
      border-radius: 40px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.25rem;
      color: #2563eb;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    body.dark .theme-toggle {
      background: #1e293b;
      border-color: #475569;
      color: #fbbf24;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .theme-toggle:hover {
      transform: scale(1.03);
      background: #ffffff;
    }

    body.dark .theme-toggle:hover {
      background: #334155;
    }

    .main-content {
      padding: 12px 2rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
    }

    .external-page-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 0;
    }

    .page-action-bar {
      background: #ffffff;
      border-radius: 32px;
      padding: 0.5rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      width: fit-content;
      border: 1px solid #eef2f8;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      margin-top: 0;
    }

    body.dark .page-action-bar {
      background: #1e293b;
      border-color: #334155;
      box-shadow: none;
    }

    .action-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 1rem;
      color: #0f172a;
    }

    body.dark .action-title {
      color: #f1f5f9;
    }

    .action-title i {
      font-size: 1.2rem;
      color: #3b82f6;
    }

    body.dark .action-title i {
      color: #60a5fa;
    }

    .iframe-wrapper {
      flex: 1;
      min-height: 0;
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.1);
      border: 1px solid #ecf3f9;
      transition: border-color 0.2s, background 0.2s;
    }

    body.dark .iframe-wrapper {
      background: #0f172a;
      border-color: #334155;
      box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.4);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .main-panel::-webkit-scrollbar {
      width: 5px;
    }

    .main-panel::-webkit-scrollbar-track {
      background: #eef2f8;
      border-radius: 10px;
    }

    body.dark .main-panel::-webkit-scrollbar-track {
      background: #1e293b;
    }

    .main-panel::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    body.dark .main-panel::-webkit-scrollbar-thumb {
      background: #475569;
    }

    @media (max-width: 680px) {
      .main-content {
        padding: 12px 1rem 1rem 1rem;
      }
      .theme-toggle-wrapper {
        top: 12px;
        right: 16px;
      }
      .page-action-bar {
        padding: 0.4rem 1rem;
      }
      .action-title {
        font-size: 0.85rem;
      }
    }

    img, video, iframe {
      -webkit-user-drag: none;
      user-drag: none;
      draggable: false;
    }

    /* loader removed, app visible always */
    #loader {
      display: none;
    }
  </style>
</head>
<body class="dark">
    <div id="loader" style="display: none;">Loading dashboard...</div>
    <div id="app">
        <div class="app-container">
            <aside class="sidebar collapsed" id="sidebar">
                <div class="logo-area">
                    <div class="logo-brand">
                        <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
                        <div class="logo-text"><img src="/assets/img/logo.png" alt="ViPeR Logo" onerror="this.style.display='none'; this.nextSibling?.style?.display?.block; console.log('Logo placeholder');"><span style="display:none;">ViPeR</span></div>
                    </div>
                    <button class="toggle-sidebar-btn" id="toggleSidebarBtn" title="Collapse / Expand sidebar"><i class="fas fa-bars"></i></button>
                </div>
                <div class="nav-menu">
                    <div class="nav-item" data-view="home" title="Home"><i class="fas fa-home"></i><span>Home</span></div>
                    <div class="nav-item" data-view="outage" title="Outage SMS Template"><i class="fas fa-bolt"></i><span>Outage SMS Template</span></div>
                    <div class="nav-item" data-view="urgent" title="Urgent Visit"><i class="fas fa-exclamation-triangle"></i><span>Urgent Visit</span></div>
                    <div class="nav-item" data-view="linkdashboard" title="Link Dashboard"><i class="fas fa-code-branch"></i><span>Link Dashboard</span></div>
                    <div class="nav-item" data-view="branch" title="Branch Details"><i class="fas fa-chalkboard-user"></i><span>Branch Details</span></div>
                    <div class="nav-item" data-view="notes" title="Local Notes"><i class="fas fa-sticky-note"></i><span>Local Notes</span></div>
                    <div class="nav-item placeholder" data-view="analytics" title="Analytics (coming soon)"><i class="fas fa-chart-line"></i><span>Analytics</span></div>
                    <div class="nav-item placeholder" data-view="reports" title="Reports (coming soon)"><i class="fas fa-file-alt"></i><span>Reports</span></div>
                </div>
                <div class="account-panel">
                    <div class="user-info">
                        <div class="user-avatar" id="staticAvatar">V</div>
                        <div class="user-details">
                            <h4 id="staticUserName">ViPeR Operator</h4>
                            <p id="staticUserEmail">demo@viper.local</p>
                        </div>
                    </div>
                    <!-- Logout button removed as per Firebase removal requirement -->
                    <div class="sync-status"><i class="fas fa-check-circle"></i><span>Local Mode (Offline Ready)</span></div>
                </div>
            </aside>
            <main class="main-panel" id="mainPanel">
                <div class="theme-toggle-wrapper">
                    <div id="themeToggle" class="theme-toggle" title="Dark/Light mode"><i class="fas fa-sun"></i></div>
                </div>
                <div class="main-content" id="dynamicContentRoot"></div>
            </main>
        </div>
    </div>

    <script>
      // ===================== FRONTEND SECURITY LAYER (no Firebase) =====================
      (function() {
          // 1. BLOCK RIGHT-CLICK (ContextMenu) except on input/textarea for usability
          document.addEventListener('contextmenu', function(e) {
              let tag = e.target.tagName.toLowerCase();
              let isEditable = e.target.isContentEditable || 
                               (tag === 'input' && e.target.type !== 'checkbox' && e.target.type !== 'radio') || 
                               tag === 'textarea';
              if (!isEditable) {
                  e.preventDefault();
                  return false;
              }
          });
          
          // 2. BLOCK DEVTOOLS KEY COMBINATIONS & VIEW-SOURCE SHORTCUTS
          document.addEventListener('keydown', function(e) {
              // Block F12
              if (e.key === 'F12' || e.code === 'F12') {
                  e.preventDefault();
                  e.stopPropagation();
                  return false;
              }
              // Block Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C (DevTools panels)
              if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C' || e.code === 'KeyI' || e.code === 'KeyJ' || e.code === 'KeyC')) {
                  e.preventDefault();
                  return false;
              }
              // Block Ctrl+U (View Source)
              if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.code === 'KeyU')) {
                  e.preventDefault();
                  return false;
              }
              // Block Ctrl+S (Save Page)
              if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.code === 'KeyS')) {
                  e.preventDefault();
                  return false;
              }
              // Block Ctrl+P (Print)
              if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.code === 'KeyP')) {
                  e.preventDefault();
                  return false;
              }
              // Block Ctrl+Shift+R (Hard reload) - optional
              if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'R' || e.code === 'KeyR')) {
                  e.preventDefault();
                  return false;
              }
          });
          
          // 3. ANTI-DRAG & DROP
          document.querySelectorAll('img, iframe, .iframe-wrapper').forEach(el => {
              if (el.setAttribute) el.setAttribute('draggable', 'false');
          });
          document.addEventListener('dragstart', function(e) {
              if (e.target.tagName === 'IMG' || e.target.closest('iframe')) {
                  e.preventDefault();
                  return false;
              }
          });
          
          // 4. DETECT DEVTOOLS OPENING but without redirecting to /login (we only warn and block further interaction)
          let devToolsOpen = false;
          function detectDevTools() {
              const threshold = 160;
              const start = performance.now();
              debugger; // this halts execution if devtools open, causing time difference
              const end = performance.now();
              if (end - start > threshold) {
                  if (!devToolsOpen) {
                      devToolsOpen = true;
                      console.warn("DevTools detected! For security, some functionalities might be limited.");
                      // Instead of redirecting to login (since auth is removed), we just alert a warning
                      // and optionally prevent certain actions: no forceful redirect to keep working
                      alert("Developer tools detected. For security, dashboard may behave unexpectedly. Please close DevTools.");
                  }
              } else {
                  devToolsOpen = false;
              }
          }
          setInterval(detectDevTools, 3000);
          
          // Additional detection via dimensions (without redirect to login)
          function detectByDimensions() {
              const threshold = 200;
              const widthDiff = window.outerWidth - window.innerWidth;
              const heightDiff = window.outerHeight - window.innerHeight;
              if (widthDiff > threshold || heightDiff > threshold) {
                  if (!devToolsOpen) {
                      devToolsOpen = true;
                      console.warn("DevTools panel suspected via dimensions.");
                      alert("Debugger tools detected. Please close for optimal experience.");
                  }
              }
          }
          setInterval(detectByDimensions, 2000);
          
          // 5. FRAME-BUSTING (prevent iframe hijacking)
          if (window.self !== window.top) {
              window.top.location = window.self.location;
          }
          
          // 6. DISABLE CONSOLE OVERRIDE only for sensitive logs - keep minimal interference
          if (typeof window.console !== "undefined") {
              // Keep original but we can avoid excessive noise: do not fully mute errors, but preserve functionality
              // To maintain debugging for dev but block generic info spam: we leave untouched for compatibility.
              // No aggressive console wiping.
          }
          
          // 7. Disable copy/cut/paste on sensitive areas (non-inputs)
          document.addEventListener('copy', function(e) {
              let target = e.target;
              if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                  e.preventDefault();
                  return false;
              }
          });
          document.addEventListener('cut', function(e) {
              let target = e.target;
              if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                  e.preventDefault();
                  return false;
              }
          });
          document.addEventListener('paste', function(e) {
              let target = e.target;
              if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                  e.preventDefault();
                  return false;
              }
          });
      })();
    </script>

    <script>
      // ===================== VIOPER DASHBOARD (No Firebase, No Login) =====================
      
      // Static user info for demo (no authentication)
      function setStaticUserInfo() {
          const userNameElem = document.getElementById('staticUserName');
          const userEmailElem = document.getElementById('staticUserEmail');
          const avatarElem = document.getElementById('staticAvatar');
          if (userNameElem) userNameElem.textContent = "ViPeR Operator";
          if (userEmailElem) userEmailElem.textContent = "demo@viper.local";
          if (avatarElem) avatarElem.textContent = "V";
      }
      
      // ---------- DARK/LIGHT MODE ----------
      function initTheme() {
        const savedTheme = localStorage.getItem('ai_notes_theme');
        const body = document.body;
        const toggleIcon = document.querySelector('#themeToggle i');
        if (savedTheme === 'light') {
          body.classList.add('light');
          body.classList.remove('dark');
          if (toggleIcon) toggleIcon.className = 'fas fa-moon';
        } else {
          body.classList.add('dark');
          body.classList.remove('light');
          if (toggleIcon) toggleIcon.className = 'fas fa-sun';
          if (savedTheme !== 'dark') localStorage.setItem('ai_notes_theme', 'dark');
        }
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
          themeBtn.addEventListener('click', () => {
            if (body.classList.contains('light')) {
              body.classList.remove('light');
              body.classList.add('dark');
              localStorage.setItem('ai_notes_theme', 'dark');
              if (toggleIcon) toggleIcon.className = 'fas fa-sun';
            } else {
              body.classList.remove('dark');
              body.classList.add('light');
              localStorage.setItem('ai_notes_theme', 'light');
              if (toggleIcon) toggleIcon.className = 'fas fa-moon';
            }
          });
        }
      }
      
      // ---------- IFRAME LOADER (External Pages) ----------
      function loadExternalPage(sectionKey, sectionTitle, iconClass) {
        const container = document.getElementById("dynamicContentRoot");
        if (!container) return;
        let url = "";
        if (sectionKey === "home") url = "../viper/home-dashboard.html";
        else if (sectionKey === "notes") url = "../viper/notes.html";
        else if (sectionKey === "outage") url = "../viper/outage-template.html";
        else if (sectionKey === "urgent") url = "../viper/urgent-visit.html";
        else if (sectionKey === "linkdashboard") url = "../viper/link-dashboard.html";
        else if (sectionKey === "branch") url = "../viper/branch.html";
        else return;
        
        container.innerHTML = `
          <div class="external-page-container">
            <div class="page-action-bar">
              <div class="action-title"><i class="${iconClass}"></i> ${sectionTitle}</div>
            </div>
            <div class="iframe-wrapper">
              <iframe src="${url}" title="${sectionTitle}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals" loading="lazy"></iframe>
            </div>
          </div>
        `;
      }
      
      // ---------- NAVIGATION ----------
      let _currentView = 'home';
      function setActiveNav(viewId) {
        document.querySelectorAll('.nav-item:not(.placeholder)').forEach(item => {
          const v = item.getAttribute('data-view');
          if (v === viewId) item.classList.add('active');
          else item.classList.remove('active');
        });
      }
      
      async function switchToView(view) {
        if (view === 'analytics' || view === 'reports') return;
        _currentView = view;
        setActiveNav(view);
        if (view === 'home') loadExternalPage('home', 'Home Dashboard', 'fas fa-home');
        else if (view === 'notes') loadExternalPage('notes', 'Notes Manager', 'fas fa-sticky-note');
        else if (view === 'outage') loadExternalPage('outage', 'Outage SMS Template', 'fas fa-bolt');
        else if (view === 'urgent') loadExternalPage('urgent', 'Urgent Visit', 'fas fa-exclamation-triangle');
        else if (view === 'linkdashboard') loadExternalPage('linkdashboard', 'Link Dashboard', 'fas fa-chalkboard-user');
        else if (view === 'branch') loadExternalPage('branch', 'Branch Dashboard', 'fas fa-code-branch');
      }
      
      // Cross-iframe navigation handler (from iframe child pages requesting navigation)
      window.addEventListener('message', (event) => {
        if (event.data && event.data.action === 'navigate') {
          const view = event.data.view;
          if (view === 'outage') {
            loadExternalPage('outage', 'Outage SMS Template', 'fas fa-bolt');
            setActiveNav('outage');
            _currentView = 'outage';
          } else if (view === 'urgent') {
            loadExternalPage('urgent', 'Urgent Visit', 'fas fa-exclamation-triangle');
            setActiveNav('urgent');
            _currentView = 'urgent';
          } else if (view === 'home') {
            loadExternalPage('home', 'Home Dashboard', 'fas fa-home');
            setActiveNav('home');
            _currentView = 'home';
          } else if (view === 'notes') {
            loadExternalPage('notes', 'Notes Manager', 'fas fa-sticky-note');
            setActiveNav('notes');
            _currentView = 'notes';
          } else if (view === 'linkdashboard') {
            loadExternalPage('linkdashboard', 'Link Dashboard', 'fas fa-chalkboard-user');
            setActiveNav('linkdashboard');
            _currentView = 'linkdashboard';
          } else if (view === 'branch') {
            loadExternalPage('branch', 'Branch Dashboard', 'fas fa-code-branch');
            setActiveNav('branch');
            _currentView = 'branch';
          }
        }
      });
      
      // ---------- SIDEBAR COLLAPSE (LocalStorage) ----------
      function initSidebarToggle() {
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleSidebarBtn');
        if (!sidebar || !toggleBtn) return;
        const storedState = localStorage.getItem('sidebar_collapsed');
        if (storedState !== null) {
          if (storedState === 'true') sidebar.classList.add('collapsed');
          else sidebar.classList.remove('collapsed');
        } else {
          localStorage.setItem('sidebar_collapsed', 'true');
        }
        toggleBtn.addEventListener('click', () => {
          sidebar.classList.toggle('collapsed');
          localStorage.setItem('sidebar_collapsed', sidebar.classList.contains('collapsed'));
        });
      }
      
      // ---------- NAVIGATION EVENT HANDLING (Static) ----------
      function initNavigation() {
        document.querySelectorAll('.nav-item:not(.placeholder)').forEach(item => {
          item.addEventListener('click', () => {
            const view = item.getAttribute('data-view');
            if (view) switchToView(view);
          });
        });
        document.querySelectorAll('.nav-item.placeholder').forEach(item => {
          item.addEventListener('click', () => { alert("Feature under development."); });
        });
      }
      
      // ---------- ENSURE IFRAME CONTENT RENDERING AFTER PAGE LOAD ----------
      function bootstrapDashboard() {
        setStaticUserInfo();
        initTheme();
        initSidebarToggle();
        initNavigation();
        // Load default Home view
        switchToView('home');
        // Make sure body visibility and remove any loader remnants
        const loader = document.getElementById('loader');
        if (loader) loader.style.display = 'none';
        const appDiv = document.getElementById('app');
        if (appDiv) appDiv.style.display = 'block';
        document.body.style.visibility = 'visible';
      }
      
      // Execute after DOM ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bootstrapDashboard);
      } else {
        bootstrapDashboard();
      }
    </script>
</body>
</html>
