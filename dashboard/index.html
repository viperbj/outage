<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <!-- Disable caching for additional security (mitigate cached sensitive data) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- Prevent automatic detection of phone numbers/emails (minor privacy) -->
  <meta name="format-detection" content="telephone=no, email=no">
  <title>ViPeR Hub | Secure Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      /* Disable text selection & drag for most elements (inputs/textareas will be overridden) */
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Allow selection inside input fields, textareas, and contenteditable (if any) for usability */
    input, textarea, [contenteditable="true"] {
      user-select: text !important;
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      -ms-user-select: text !important;
    }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.2s ease, color 0.2s ease;
      visibility: hidden; 
    }

    /* Light mode (fallback) */
    body.light {
      background: #f4f7fc;
      color: #1a2634;
    }

    body.dark {
      background: #0f172a;
      color: #e2e8f0;
    }

    .app-container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* ---------- SIDEBAR ---------- */
    .sidebar {
      width: 280px;
      background: #ffffff;
      border-right: 1px solid #e6edf4;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      transition: width 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1), background 0.2s, border-color 0.2s;
      overflow-x: hidden;
      z-index: 20;
      flex-shrink: 0;
    }

    body.dark .sidebar {
      background: #1e293b;
      border-right-color: #334155;
    }

    .sidebar.collapsed {
      width: 88px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding: 0 8px;
    }

    .logo-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }

    .logo-icon {
      background: #3b82f6;
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: white;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
    }

    .logo-text img {
      max-width: 120px;
      height: auto;
    }

    body.dark .logo-text {
      background: linear-gradient(135deg, #60a5fa, #818cf8);
    }

    .sidebar.collapsed .logo-text {
      opacity: 0;
      width: 0;
      display: none;
    }

    .toggle-sidebar-btn {
      background: #eff3f8;
      border: none;
      border-radius: 30px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2c4f6e;
      font-size: 1.2rem;
      transition: 0.2s;
      flex-shrink: 0;
    }

    body.dark .toggle-sidebar-btn {
      background: #334155;
      color: #cbd5e1;
    }

    .toggle-sidebar-btn:hover {
      background: #e2e8f0;
      color: #2563eb;
    }

    body.dark .toggle-sidebar-btn:hover {
      background: #475569;
      color: #60a5fa;
    }

    .nav-menu {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-radius: 18px;
      font-weight: 500;
      font-size: 0.95rem;
      color: #2c3e4f;
      transition: all 0.2s ease;
      cursor: pointer;
      white-space: nowrap;
    }

    body.dark .nav-item {
      color: #cbd5e1;
    }

    .nav-item i {
      width: 24px;
      font-size: 1.2rem;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-item span {
      transition: opacity 0.2s;
    }

    .sidebar.collapsed .nav-item span {
      opacity: 0;
      width: 0;
      display: none;
    }

    .nav-item:hover {
      background: #eff3f8;
      color: #1e40af;
    }

    body.dark .nav-item:hover {
      background: #334155;
      color: #60a5fa;
    }

    .nav-item.active {
      background: #eef2ff;
      color: #2563eb;
      font-weight: 600;
    }

    body.dark .nav-item.active {
      background: #2563eb20;
      color: #60a5fa;
    }

    .nav-item.placeholder {
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
    }

    body.dark .nav-item.placeholder {
      opacity: 0.5;
    }

    .account-panel {
      margin-top: auto;
      padding: 1rem 0.5rem 0.8rem;
      border-top: 1px solid #eef2f8;
    }

    body.dark .account-panel {
      border-top-color: #334155;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .user-avatar {
      background: #2563eb;
      width: 42px;
      height: 42px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.1rem;
      color: white;
      flex-shrink: 0;
    }

    .user-details {
      overflow: hidden;
      transition: 0.2s;
    }

    .user-details h4 {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .user-details p {
      font-size: 0.7rem;
      color: #5f7f9c;
    }

    body.dark .user-details p {
      color: #94a3b8;
    }

    .sidebar.collapsed .user-details {
      opacity: 0;
      width: 0;
      display: none;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid #e2e8f0;
      border-radius: 40px;
      padding: 8px 12px;
      width: 100%;
      font-size: 0.8rem;
      font-weight: 500;
      color: #b91c1c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
    }

    body.dark .logout-btn {
      border-color: #475569;
      color: #f87171;
    }

    .logout-btn:hover {
      background: #fef2f2;
      border-color: #fecaca;
    }

    body.dark .logout-btn:hover {
      background: #450a0a;
      border-color: #7f1d1d;
    }

    .sidebar.collapsed .logout-btn span {
      display: none;
    }

    .sidebar.collapsed .logout-btn {
      justify-content: center;
    }

    .sync-status {
      font-size: 0.7rem;
      color: #8ba0b0;
      margin-top: 12px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    body.dark .sync-status {
      color: #64748b;
    }

    /* ---------- MAIN PANEL ---------- */
    .main-panel {
      flex: 1;
      position: relative;
      overflow-y: auto;
      background: inherit;
    }

    .theme-toggle-wrapper {
      position: absolute;
      top: 16px;
      right: 24px;
      z-index: 99;
      margin: 0;
    }

    .theme-toggle {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      border: 1px solid #e2e8f0;
      border-radius: 40px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.25rem;
      color: #2563eb;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    body.dark .theme-toggle {
      background: #1e293b;
      border-color: #475569;
      color: #fbbf24;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .theme-toggle:hover {
      transform: scale(1.03);
      background: #ffffff;
    }

    body.dark .theme-toggle:hover {
      background: #334155;
    }

    .main-content {
      padding: 12px 2rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
    }

    .external-page-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 0;
    }

    .page-action-bar {
      background: #ffffff;
      border-radius: 32px;
      padding: 0.5rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      width: fit-content;
      border: 1px solid #eef2f8;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      margin-top: 0;
    }

    body.dark .page-action-bar {
      background: #1e293b;
      border-color: #334155;
      box-shadow: none;
    }

    .action-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 1rem;
      color: #0f172a;
    }

    body.dark .action-title {
      color: #f1f5f9;
    }

    .action-title i {
      font-size: 1.2rem;
      color: #3b82f6;
    }

    body.dark .action-title i {
      color: #60a5fa;
    }

    .iframe-wrapper {
      flex: 1;
      min-height: 0;
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.1);
      border: 1px solid #ecf3f9;
      transition: border-color 0.2s, background 0.2s;
    }

    body.dark .iframe-wrapper {
      background: #0f172a;
      border-color: #334155;
      box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.4);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .main-panel::-webkit-scrollbar {
      width: 5px;
    }

    .main-panel::-webkit-scrollbar-track {
      background: #eef2f8;
      border-radius: 10px;
    }

    body.dark .main-panel::-webkit-scrollbar-track {
      background: #1e293b;
    }

    .main-panel::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    body.dark .main-panel::-webkit-scrollbar-thumb {
      background: #475569;
    }

    @media (max-width: 680px) {
      .main-content {
        padding: 12px 1rem 1rem 1rem;
      }
      .theme-toggle-wrapper {
        top: 12px;
        right: 16px;
      }
      .page-action-bar {
        padding: 0.4rem 1rem;
      }
      .action-title {
        font-size: 0.85rem;
      }
    }

    /* Additional anti-selection for overlay (just in case) */
    img, video, iframe {
      -webkit-user-drag: none;
      user-drag: none;
      draggable: false;
    }
  </style>
</head>
<body class="dark">
    <div id="loader">Validating secure session ...</div>
    <div id="app" style="display: none;">
        <div class="app-container">
            <aside class="sidebar collapsed" id="sidebar">

    </div>

    <script>
      // ===================== FRONTEND SECURITY LAYER =====================
      (function() {
          // 1. BLOCK RIGHT-CLICK (ContextMenu) except on input/textarea for usability
          document.addEventListener('contextmenu', function(e) {
              let tag = e.target.tagName.toLowerCase();
              let isEditable = e.target.isContentEditable || 
                               (tag === 'input' && e.target.type !== 'checkbox' && e.target.type !== 'radio') || 
                               tag === 'textarea';
              if (!isEditable) {
                  e.preventDefault();
                  return false;
              }
          });
          
          // 2. BLOCK DEVTOOLS KEY COMBINATIONS & VIEW-SOURCE SHORTCUTS
          document.addEventListener('keydown', function(e) {
              // Block F12
              if (e.key === 'F12' || e.code === 'F12') {
                  e.preventDefault();
                  e.stopPropagation();
                  return false;
              }
              // Block Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C (DevTools panels)
              if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C' || e.code === 'KeyI' || e.code === 'KeyJ' || e.code === 'KeyC')) {
                  e.preventDefault();
                  return false;
              }
              // Block Ctrl+U (View Source)
              if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.code === 'KeyU')) {
                  e.preventDefault();
                  return false;
              }
              // Block Ctrl+S (Save Page) to prevent local saving of source
              if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.code === 'KeyS')) {
                  e.preventDefault();
                  return false;
              }
              // Block Ctrl+P (Print) – sometimes used to inspect layout
              if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.code === 'KeyP')) {
                  e.preventDefault();
                  return false;
              }
              // Block Ctrl+Shift+R (Hard reload bypassing cache) – optional 
              if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'R' || e.code === 'KeyR')) {
                  e.preventDefault();
                  return false;
              }
          });
          
          // 3. ANTI-DRAG & DROP (prevent dragging images or iframe content)
          document.querySelectorAll('img, iframe, .iframe-wrapper').forEach(el => {
              el.setAttribute('draggable', 'false');
          });
          document.addEventListener('dragstart', function(e) {
              if (e.target.tagName === 'IMG' || e.target.closest('iframe')) {
                  e.preventDefault();
                  return false;
              }
          });
          
          // 4. DETECT DEVTOOLS OPENING (via time difference / debugger check)
          let devToolsOpen = false;
          function detectDevTools() {
              const threshold = 160;
              const start = performance.now();
              debugger; // this halts execution if devtools open, causing time difference
              const end = performance.now();
              if (end - start > threshold) {
                  if (!devToolsOpen) {
                      devToolsOpen = true;
                      // Optional: aggressive action – clear session and redirect to login
                      console.warn("DevTools detected! Redirecting...");
                      localStorage.removeItem('ai_notes_session_demo');
                      window.location.href = "/login/index.html?blocked=devtools";
                  }
              } else {
                  devToolsOpen = false;
              }
          }
          // Run detection every 2 seconds
          setInterval(detectDevTools, 2000);
          
          // Additional detection via window resize + outer vs inner dimensions
          function detectByDimensions() {
              const threshold = 200;
              const widthDiff = window.outerWidth - window.innerWidth;
              const heightDiff = window.outerHeight - window.innerHeight;
              if (widthDiff > threshold || heightDiff > threshold) {
                  if (!devToolsOpen) {
                      devToolsOpen = true;
                      window.location.href = "/login/index.html?blocked=devtools";
                  }
              }
          }
          setInterval(detectByDimensions, 1500);
          
          // 5. FRAME-BUSTING (prevent iframe hijacking / clickjacking)
          if (window.self !== window.top) {
              window.top.location = window.self.location;
          }
          
          // 6. DISABLE BROWSER EXTENSION / CONSOLE WARNING SPAM? we can redirect if console is heavily used?
          // Override console methods to reduce info leakage (optional but can break debugging)
          // Instead, we block the console output but preserve Firebase logs? We'll only override for security.
          if (typeof window.console !== "undefined") {
              let originalConsole = window.console;
              window.console = {
                  ...originalConsole,
                  log: function() {},
                  info: function() {},
                  warn: function() {},
                  debug: function() {},
                  // keep error for debugging but sanitize
                  error: function(...args) {
                      if (args[0] && args[0].includes && args[0].includes('Firebase')) {
                          originalConsole.error(...args);
                      } else {
                          // ignore generic errors
                      }
                  }
              };
          }
          
          // 7. INJECT NO-SOURCE VIEW PROTECTION: Disable selection of any DOM elements (CSS already)
          // Additional: prevent copy event globally (except input fields)
          document.addEventListener('copy', function(e) {
              let target = e.target;
              if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                  e.preventDefault();
                  return false;
              }
          });
          document.addEventListener('cut', function(e) {
              let target = e.target;
              if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                  e.preventDefault();
                  return false;
              }
          });
          document.addEventListener('paste', function(e) {
              // allow paste only on inputs
              let target = e.target;
              if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                  e.preventDefault();
                  return false;
              }
          });
      })();
    </script>

    <script>
      // ===================== FIREBASE CONFIGURATION =====================
      
      const firebaseConfig = {
        apiKey: "AIzaSyD_g49suLWESZZ377AxsL2G8JTcEBGT0tI",
        authDomain: "outage-login-947d8.firebaseapp.com",
        projectId: "outage-login-947d8",
        appId: "1:436354690312:web:3ed241912899af6a1450bd"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      // ---------- OFFLINE TIMER (2 HOURS) ----------
      let offlineTimer = null;
      const OFFLINE_TIMEOUT_MS = 2 * 60 * 60 * 1000; // 2 hours

      function startOfflineTimer() {
        if (offlineTimer) clearTimeout(offlineTimer);
        offlineTimer = setTimeout(async () => {
          console.log("Offline for 2 hours – signing out...");
          try {
            await auth.signOut();
            localStorage.removeItem('ai_notes_session_demo');
            window.location.href = "/login";
          } catch (e) {
            console.error("Offline signOut error:", e);
            window.location.href = "/login";
          }
        }, OFFLINE_TIMEOUT_MS);
      }

      function cancelOfflineTimer() {
        if (offlineTimer) {
          clearTimeout(offlineTimer);
          offlineTimer = null;
        }
      }

      window.addEventListener('online', () => {
        console.log("Internet connection restored – cancelling offline timer.");
        cancelOfflineTimer();
      });
      window.addEventListener('offline', () => {
        console.log("Internet disconnected – starting 2‑hour timer.");
        startOfflineTimer();
      });

      if (!navigator.onLine) {
        startOfflineTimer();
      }

      // ---------- FIREBASE AUTH STATE OBSERVER ----------
      auth.onAuthStateChanged((user) => {
        const app = document.getElementById("app");
        const loader = document.getElementById("loader");

        if (!user) {
          if (app) app.style.display = "none";
          sessionStorage.setItem("redirectAfterLogin", window.location.pathname + window.location.search);
          window.location.replace("/login");
        } else {
          if (loader) loader.style.display = "none";
          if (app) app.style.display = "block";
          document.body.style.visibility = "visible";

          const userNameElem = document.querySelector('.user-details h4');
          const userEmailElem = document.querySelector('.user-details p');
          if (userNameElem && userEmailElem) {
            userNameElem.textContent = user.displayName || user.email?.split('@')[0] || "ViPeR User";
            userEmailElem.textContent = user.email || "user@viper.com";
          }
          const avatarElem = document.querySelector('.user-avatar');
          if (avatarElem && user.email) {
            avatarElem.textContent = user.email.charAt(0).toUpperCase();
          }
        }
      });

      // ---------- DARK/LIGHT MODE WITH DARK AS DEFAULT ----------
      function initTheme() {
        const savedTheme = localStorage.getItem('ai_notes_theme');
        const body = document.body;
        const toggleIcon = document.querySelector('#themeToggle i');
        if (savedTheme === 'light') {
          body.classList.add('light');
          body.classList.remove('dark');
          toggleIcon.className = 'fas fa-moon';
        } else {
          body.classList.add('dark');
          body.classList.remove('light');
          toggleIcon.className = 'fas fa-sun';
          if (savedTheme !== 'dark') localStorage.setItem('ai_notes_theme', 'dark');
        }
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.addEventListener('click', () => {
          if (body.classList.contains('light')) {
            body.classList.remove('light');
            body.classList.add('dark');
            localStorage.setItem('ai_notes_theme', 'dark');
            toggleIcon.className = 'fas fa-sun';
          } else {
            body.classList.remove('dark');
            body.classList.add('light');
            localStorage.setItem('ai_notes_theme', 'light');
            toggleIcon.className = 'fas fa-moon';
          }
        });
      }

      // ---------- IFRAME LOADER ----------
      function loadExternalPage(sectionKey, sectionTitle, iconClass) {
        const container = document.getElementById("dynamicContentRoot");
        if (!container) return;
        let url = "";
        if (sectionKey === "home") url = "/viper/home-dashboard.html";
        else if (sectionKey === "notes") url = "/viper/notes.html";
        else if (sectionKey === "outage") url = "/viper/outage-template.html";
        else if (sectionKey === "urgent") url = "/viper/urgent-visit.html";
        else if (sectionKey === "linkdashboard") url = "/viper/link-dashboard.html";
        else if (sectionKey === "branch") url = "/viper/branch.html";
        else return;
        
        container.innerHTML = `
          <div class="external-page-container">
            <div class="page-action-bar">
              <div class="action-title"><i class="${iconClass}"></i> ${sectionTitle}</div>
            </div>
            <div class="iframe-wrapper">
              <iframe src="${url}" title="${sectionTitle}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals" loading="lazy"></iframe>
            </div>
          </div>
        `;
      }

      // ---------- NAVIGATION ----------
      let _currentView = 'home';
      function setActiveNav(viewId) {
        document.querySelectorAll('.nav-item:not(.placeholder)').forEach(item => {
          const v = item.getAttribute('data-view');
          if (v === viewId) item.classList.add('active');
          else item.classList.remove('active');
        });
      }
      
      async function switchToView(view) {
        if (view === 'analytics' || view === 'reports') return;
        _currentView = view;
        setActiveNav(view);
        if (view === 'home') loadExternalPage('home', 'Home Dashboard', 'fas fa-home');
        else if (view === 'notes') loadExternalPage('notes', 'Notes Manager', 'fas fa-sticky-note');
        else if (view === 'outage') loadExternalPage('outage', 'Outage Template', 'fas fa-bolt');
        else if (view === 'urgent') loadExternalPage('urgent', 'Urgent Visit', 'fas fa-exclamation-triangle');
        else if (view === 'linkdashboard') loadExternalPage('linkdashboard', 'Link Dashboard', 'fas fa-chalkboard-user');
        else if (view === 'branch') loadExternalPage('branch', 'Branch Dashboard', 'fas fa-code-branch');
      }

      window.addEventListener('message', (event) => {
        if (event.data && event.data.action === 'navigate') {
          const view = event.data.view;
          if (view === 'outage') {
            loadExternalPage('outage', 'Outage SMS Template', 'fas fa-bolt');
            setActiveNav('outage');
          } else if (view === 'urgent') {
            loadExternalPage('urgent', 'Urgent Visit', 'fas fa-exclamation-triangle');
            setActiveNav('urgent');
          }
        }
      });

      function initSidebarToggle() {
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleSidebarBtn');
        const storedState = localStorage.getItem('sidebar_collapsed');
        if (storedState !== null) {
          if (storedState === 'true') sidebar.classList.add('collapsed');
          else sidebar.classList.remove('collapsed');
        } else {
          localStorage.setItem('sidebar_collapsed', 'true');
        }
        toggleBtn.addEventListener('click', () => {
          sidebar.classList.toggle('collapsed');
          localStorage.setItem('sidebar_collapsed', sidebar.classList.contains('collapsed'));
        });
      }

      function initLogout() {
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', async () => {
            try {
              await auth.signOut();
              localStorage.removeItem('ai_notes_session_demo');
              window.location.href = "/login/index.html";
            } catch (error) {
              console.error("Logout error:", error);
              alert("Secure logout failed. Retry.");
            }
          });
        }
      }

      function initNavigation() {
        document.querySelectorAll('.nav-item:not(.placeholder)').forEach(item => {
          item.addEventListener('click', () => {
            const view = item.getAttribute('data-view');
            if (view) switchToView(view);
          });
        });
        document.querySelectorAll('.nav-item.placeholder').forEach(item => {
          item.addEventListener('click', () => { alert("Feature under development."); });
        });
      }

      initTheme();
      initSidebarToggle();
      initLogout();
      initNavigation();
      switchToView('home');
    </script>
</body>
</html>
