<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Syncscribe – Notes Dashboard (Dark Mode + Clickable Links)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-page: #0a0c10;
      --sidebar-bg: #111316;
      --card-bg: #1c1f26;
      --border-subtle: #2a2e36;
      --text-primary: #eceff4;
      --text-secondary: #9aa3b8;
      --accent: #84cc16;
      --accent-hover: #a3e635;
      --btn-primary: #84cc16;
      --btn-primary-hover: #9fdf3a;
      --danger: #f87171;
      --danger-hover: #ef4444;
      --folder-active: #2d2f36;
      --input-bg: #1e2128;
    }

    body {
      background: var(--bg-page);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      height: 100vh;
      width: 100%;
      background: var(--bg-page);
    }

    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      padding: 28px 20px 24px 20px;
      overflow-y: auto;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 28px;
    }

    .logo-text {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #84cc16, #c0f060);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .create-btn-side {
      background: var(--btn-primary);
      border: none;
      color: #0a0c10;
      font-weight: 700;
      padding: 10px 0;
      border-radius: 40px;
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 32px;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .create-btn-side:hover {
      background: var(--btn-primary-hover);
      transform: scale(0.98);
    }

    .sidebar-section {
      margin-bottom: 28px;
    }

    .sidebar-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    .folder-list {
      list-style: none;
    }

    .folder-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 12px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .folder-item:hover {
      background: var(--folder-active);
      color: var(--text-primary);
    }

    .folder-item.active-folder {
      background: #2a323d;
      color: var(--accent);
      font-weight: 600;
    }

    .recent-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .chip {
      background: #1e2128;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s;
      color: var(--text-secondary);
    }

    .chip:hover {
      background: #2a2e36;
      color: var(--accent);
    }

    .filter-actions {
      display: flex;
      gap: 12px;
      margin: 16px 0 8px;
      flex-wrap: wrap;
    }

    .filter-pill {
      background: transparent;
      border: 1px solid var(--border-subtle);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s;
      color: var(--text-secondary);
    }

    .filter-pill.active-order {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0c10;
      font-weight: 700;
    }

    .help-settings {
      text-align: center;
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid var(--border-subtle);
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: flex;
      gap: 24px;
    }

    .help-settings span {
      cursor: pointer;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .notes-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .date-filters {
      display: flex;
      gap: 12px;
    }

    .date-btn {
      background: var(--card-bg);
      border: 1px solid var(--border-subtle);
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      color: var(--text-secondary);
    }

    .date-btn.active-date {
      background: var(--accent);
      color: #0a0c10;
      border-color: var(--accent);
      font-weight: 700;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .note-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 20px;
      border: 1px solid var(--border-subtle);
      transition: all 0.2s;
      position: relative;
    }

    .note-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .folder-badge {
      display: inline-block;
      background: #252a33;
      font-size: 0.7rem;
      padding: 4px 12px;
      border-radius: 30px;
      margin-bottom: 12px;
      color: var(--accent);
      font-weight: 500;
    }

    .note-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .note-content {
      font-size: 0.85rem;
      color: var(--text-secondary);
      white-space: pre-line;
      line-height: 1.45;
      margin-bottom: 24px;
      max-height: 130px;
      overflow-y: auto;
    }

    /* Style for clickable links inside note content */
    .note-content a {
      color: var(--accent);
      text-decoration: underline;
      word-break: break-all;
    }

    .note-content a:hover {
      color: var(--accent-hover);
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 8px;
    }

    .edit-btn, .delete-btn {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 40px;
      transition: 0.1s;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .edit-btn:hover {
      background: #2a323d;
      color: var(--accent);
    }

    .delete-btn:hover {
      background: #3b2a2a;
      color: var(--danger);
    }

    .empty-message {
      text-align: center;
      padding: 50px 20px;
      background: var(--card-bg);
      border-radius: 32px;
      color: var(--text-secondary);
    }

    .clear-filter {
      background: #252a33;
      border: none;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.7rem;
      margin-left: 12px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-container {
      background: var(--sidebar-bg);
      width: 90%;
      max-width: 520px;
      border-radius: 32px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 25px 40px rgba(0,0,0,0.5);
      padding: 28px 28px 32px;
      animation: modalPop 0.2s ease-out;
    }

    @keyframes modalPop {
      from { transform: scale(0.96); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-container h3 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 18px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 20px;
      border: 1px solid var(--border-subtle);
      font-family: inherit;
      font-size: 0.9rem;
      background: var(--input-bg);
      color: var(--text-primary);
      transition: 0.15s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(132, 204, 22, 0.3);
    }

    select option {
      background: var(--input-bg);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 28px;
    }

    .modal-save {
      background: var(--btn-primary);
      border: none;
      color: #0a0c10;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
    }

    .modal-cancel {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
    }

    .modal-cancel:hover {
      background: #252a33;
    }

    .modal-save:hover {
      background: var(--btn-primary-hover);
    }

    @media (max-width: 760px) {
      .sidebar { width: 240px; }
      .main-content { padding: 20px; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="sidebar">
    <div class="logo-area">
      <span class="logo-icon">🟢</span>
      <span class="logo-text">ViPeR Notes</span>
    </div>
    <button class="create-btn-side" id="sidebarCreateBtn">+ Create Note</button>

    <div class="sidebar-section">
      <div class="sidebar-title">📁 Folders</div>
      <ul class="folder-list" id="folderList"></ul>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">🔥 Recent Folders</div>
      <div class="recent-chips" id="recentFoldersChips"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">⚡ Filters</div>
      <div class="filter-actions" id="orderFilterGroup">
        <button data-order="all" class="filter-pill active-order">All</button>
        <button data-order="recent" class="filter-pill">Recent</button>
        <button data-order="lastmod" class="filter-pill">Last modified</button>
      </div>
    </div>

    <div class="help-settings">
      <span>Local Storage in UR Browser</span>
    </div>
  </div>

  <div class="main-content">
    <div class="notes-header">
      <h1>My Notes</h1>
      <div class="date-filters" id="dateFilterGroup">
        <button data-date="today" class="date-btn">Today</button>
        <button data-date="week" class="date-btn">This Week</button>
        <button data-date="month" class="date-btn">This Month</button>
        <button data-date="all" class="date-btn active-date">All time</button>
      </div>
    </div>

    <div id="activeFiltersInfo" style="margin-bottom: 16px; font-size: 0.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;"></div>

    <div id="notesGridContainer" class="notes-grid"></div>
  </div>
</div>

<div id="noteModal" class="modal-overlay">
  <div class="modal-container">
    <h3 id="modalTitle">✨ Create New Note</h3>
    <div class="form-group">
      <input type="text" id="modalNoteTitle" placeholder="Title (e.g., 8:00 PM Reminders)" autocomplete="off">
    </div>
    <div class="form-group">
      <textarea id="modalNoteContent" rows="4" placeholder="Write your note content ...&#10;You can paste any website link like https://example.com and it will become clickable"></textarea>
    </div>
    <div class="form-group">
      <select id="modalNoteFolder">
        <option value="">📂 No folder</option>
        <option value="Bucket List">🎯 Bucket List</option>
        <option value="Finances">💰 Finances</option>
        <option value="Travel Plans">✈️ Travel Plans</option>
        <option value="Shopping">🛍️ Shopping</option>
        <option value="Personal">🧘 Personal</option>
        <option value="Work">💼 Work</option>
        <option value="Projects">🚀 Projects</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancelBtn">Cancel</button>
      <button class="modal-save" id="modalSaveBtn">Save Note</button>
    </div>
  </div>
</div>

<script>
  let notes = [];
  let editModeId = null;

  let activeFolder = null;
  let activeDateFilter = "all";
  let activeOrder = "all";

  const FULL_FOLDERS = ["Bucket List", "Finances", "Travel Plans", "Shopping", "Personal", "Work", "Projects"];
  const RECENT_MAP = { "BL": "Bucket List", "Fi": "Finances", "TP": "Travel Plans", "Sh": "Shopping", "Pe": "Personal" };

  function isToday(dateISO) {
    const date = new Date(dateISO);
    const today = new Date();
    return date.toDateString() === today.toDateString();
  }

  function isThisWeek(dateISO) {
    const date = new Date(dateISO);
    const now = new Date();
    const startOfWeek = new Date(now);
    startOfWeek.setDate(now.getDate() - now.getDay());
    startOfWeek.setHours(0,0,0,0);
    const endOfWeek = new Date(startOfWeek);
    endOfWeek.setDate(startOfWeek.getDate() + 6);
    endOfWeek.setHours(23,59,59,999);
    return date >= startOfWeek && date <= endOfWeek;
  }

  function isThisMonth(dateISO) {
    const date = new Date(dateISO);
    const now = new Date();
    return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
  }

  function getFilteredNotes() {
    let filtered = [...notes];
    if (activeFolder) filtered = filtered.filter(n => n.folder === activeFolder);
    if (activeDateFilter === "today") filtered = filtered.filter(n => isToday(n.createdAt));
    else if (activeDateFilter === "week") filtered = filtered.filter(n => isThisWeek(n.createdAt));
    else if (activeDateFilter === "month") filtered = filtered.filter(n => isThisMonth(n.createdAt));
    return filtered;
  }

  function sortNotesByOrder(notesArray) {
    if (activeOrder === "recent") return [...notesArray].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    if (activeOrder === "lastmod") return [...notesArray].sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    return [...notesArray].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  }

  // Convert URLs in text to clickable anchor tags (opens in new tab)
  function linkify(text) {
    if (!text) return '';
    // Regex to match http://, https://, and also optional www. but we prefer full protocol
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlRegex, function(url) {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;");
  }

  function renderNotes() {
    const container = document.getElementById("notesGridContainer");
    let filtered = getFilteredNotes();
    let finalNotes = sortNotesByOrder(filtered);
    if (finalNotes.length === 0) {
      container.innerHTML = `<div class="empty-message">🌙 No notes found. Create your first note ✨</div>`;
      return;
    }
    container.innerHTML = finalNotes.map(note => {
      const escapedTitle = escapeHtml(note.title) || "Untitled";
      const escapedContent = escapeHtml(note.content);
      const linkedContent = linkify(escapedContent).replace(/\n/g, '<br>');
      return `
        <div class="note-card" data-id="${note.id}">
          <div class="folder-badge">${note.folder ? escapeHtml(note.folder) : "📄 Uncategorized"}</div>
          <div class="note-title">${escapedTitle}</div>
          <div class="note-content">${linkedContent}</div>
          <div class="card-actions">
            <button class="edit-btn" data-id="${note.id}" title="Edit note">✏️</button>
            <button class="delete-btn" data-id="${note.id}" title="Delete note">🗑️</button>
          </div>
        </div>
      `;
    }).join("");
    
    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        openModalForEdit(id);
      });
    });
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        if (confirm("Delete note permanently?")) deleteNoteById(id);
      });
    });
  }

  function deleteNoteById(id) {
    notes = notes.filter(n => n.id !== id);
    if (editModeId === id) editModeId = null;
    saveNotesToLocal();
    renderNotes();
    renderSidebarFolders();
    renderActiveFiltersInfo();
  }

  function openModalForCreate() {
    editModeId = null;
    document.getElementById("modalTitle").innerText = "✨ Create New Note";
    document.getElementById("modalNoteTitle").value = "";
    document.getElementById("modalNoteContent").value = "";
    document.getElementById("modalNoteFolder").value = "";
    document.getElementById("noteModal").classList.add("active");
  }

  function openModalForEdit(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    editModeId = id;
    document.getElementById("modalTitle").innerText = "✏️ Edit Note";
    document.getElementById("modalNoteTitle").value = note.title || "";
    document.getElementById("modalNoteContent").value = note.content || "";
    document.getElementById("modalNoteFolder").value = note.folder || "";
    document.getElementById("noteModal").classList.add("active");
  }

  function closeModal() {
    document.getElementById("noteModal").classList.remove("active");
    editModeId = null;
  }

  function saveNoteFromModal() {
    const title = document.getElementById("modalNoteTitle").value.trim();
    const content = document.getElementById("modalNoteContent").value;
    const folder = document.getElementById("modalNoteFolder").value || "";
    if (!title && !content) {
      alert("Please add a title or some content.");
      return;
    }
    const nowISO = new Date().toISOString();
    if (editModeId !== null) {
      const index = notes.findIndex(n => n.id === editModeId);
      if (index !== -1) {
        notes[index] = {
          ...notes[index],
          title: title || "Untitled",
          content: content,
          folder: folder,
          updatedAt: nowISO
        };
      }
    } else {
      const newNote = {
        id: Date.now(),
        title: title || "Untitled",
        content: content,
        folder: folder,
        createdAt: nowISO,
        updatedAt: nowISO,
      };
      notes.unshift(newNote);
    }
    saveNotesToLocal();
    renderNotes();
    renderSidebarFolders();
    renderActiveFiltersInfo();
    closeModal();
  }

  function getInitialNotes() {
    const now = new Date().toISOString();
    return [
      { id: 1001, title: "8:00 PM Reminders", content: "• Dentist appointment on Tuesday\n• Submit report by end of the day\n• Send email to boss", folder: "Work", createdAt: now, updatedAt: now },
      { id: 1002, title: "Random Thoughts", content: "✨ \"Success is a journey, not a destination\"\n🍽️ Try a new recipe this weekend!\n🌱 Don't forget to water the plants.\nCheck this link: https://example.com", folder: "Personal", createdAt: now, updatedAt: now },
      { id: 1003, title: "9:45 PM Books to Read", content: "📚 The Power of Habit by Charles Duhigg\n📖 Atomic Habits by James Clear\n✨ The Alchemist by Paulo Coelho", folder: "Bucket List", createdAt: now, updatedAt: now },
      { id: 1004, title: "Weekly goals", content: "Finish report, go for run, call mom", folder: "Personal", createdAt: now, updatedAt: now }
    ];
  }

  function loadNotesFromLocal() {
    const stored = localStorage.getItem("syncscribe_notes_dark");
    if (stored) {
      notes = JSON.parse(stored);
      if (!notes.length) notes = getInitialNotes();
    } else {
      notes = getInitialNotes();
    }
  }

  function saveNotesToLocal() {
    localStorage.setItem("syncscribe_notes_dark", JSON.stringify(notes));
  }

  function renderSidebarFolders() {
    const folderContainer = document.getElementById("folderList");
    folderContainer.innerHTML = FULL_FOLDERS.map(folder => `
      <li class="folder-item ${activeFolder === folder ? 'active-folder' : ''}" data-folder="${folder}">
        <span>📂</span> ${folder}
      </li>
    `).join('');
    document.querySelectorAll('.folder-item').forEach(el => {
      el.addEventListener('click', () => {
        const folderName = el.getAttribute('data-folder');
        activeFolder = (activeFolder === folderName) ? null : folderName;
        renderSidebarFolders();
        renderNotes();
        renderActiveFiltersInfo();
      });
    });
    
    const recentContainer = document.getElementById("recentFoldersChips");
    recentContainer.innerHTML = Object.entries(RECENT_MAP).map(([short, full]) => `
      <div class="chip" data-recent-folder="${full}">${short}</div>
    `).join('');
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const folderTarget = chip.getAttribute('data-recent-folder');
        activeFolder = folderTarget;
        renderSidebarFolders();
        renderNotes();
        renderActiveFiltersInfo();
      });
    });
  }

  function renderActiveFiltersInfo() {
    const infoDiv = document.getElementById("activeFiltersInfo");
    let parts = [];
    if (activeFolder) parts.push(`📁 Folder: ${activeFolder}`);
    if (activeDateFilter !== "all") {
      let label = activeDateFilter === "today" ? "Today" : activeDateFilter === "week" ? "This Week" : "This Month";
      parts.push(`📅 Filter: ${label}`);
    }
    let orderLabel = activeOrder === "all" ? "All notes" : activeOrder === "recent" ? "Recent first" : "Last modified";
    parts.push(`📌 Sort: ${orderLabel}`);
    if (parts.length) {
      infoDiv.innerHTML = `<span style="background:#1e2128; padding: 4px 14px; border-radius: 30px;">${parts.join(' · ')}</span>
      <button id="clearAllFiltersBtn" class="clear-filter">✖ Clear filters</button>`;
      const clearBtn = document.getElementById("clearAllFiltersBtn");
      if (clearBtn) clearBtn.onclick = () => {
        activeFolder = null;
        activeDateFilter = "all";
        activeOrder = "all";
        highlightDateFilterUI();
        highlightOrderFilterUI();
        renderSidebarFolders();
        renderNotes();
        renderActiveFiltersInfo();
      };
    } else {
      infoDiv.innerHTML = `<span style="background:#1e2128; padding: 4px 14px; border-radius: 30px;">✨ All notes</span>`;
    }
  }

  function highlightDateFilterUI() {
    document.querySelectorAll('.date-btn').forEach(btn => {
      const val = btn.getAttribute('data-date');
      if (val === activeDateFilter) btn.classList.add('active-date');
      else btn.classList.remove('active-date');
    });
  }

  function highlightOrderFilterUI() {
    document.querySelectorAll('.filter-pill').forEach(btn => {
      const orderVal = btn.getAttribute('data-order');
      if (orderVal === activeOrder) btn.classList.add('active-order');
      else btn.classList.remove('active-order');
    });
  }

  function initEventListeners() {
    document.querySelectorAll('.date-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeDateFilter = btn.getAttribute('data-date');
        highlightDateFilterUI();
        renderNotes();
        renderActiveFiltersInfo();
      });
    });
    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        activeOrder = btn.getAttribute('data-order');
        highlightOrderFilterUI();
        renderNotes();
        renderActiveFiltersInfo();
      });
    });
    document.getElementById("sidebarCreateBtn").addEventListener("click", openModalForCreate);
    document.getElementById("modalCancelBtn").addEventListener("click", closeModal);
    document.getElementById("modalSaveBtn").addEventListener("click", saveNoteFromModal);
    document.getElementById("noteModal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("noteModal")) closeModal();
    });
  }

  function init() {
    loadNotesFromLocal();
    activeFolder = null;
    activeDateFilter = "all";
    activeOrder = "all";
    renderSidebarFolders();
    renderNotes();
    initEventListeners();
    highlightDateFilterUI();
    highlightOrderFilterUI();
    renderActiveFiltersInfo();
  }

  init();
</script>
