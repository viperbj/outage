<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ViPeR Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    .gradient-text {
      background: linear-gradient(90deg, #a78bfa, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Modal animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .modal-backdrop {
      animation: fadeIn 0.2s ease-out;
    }
    
    .modal-content {
      animation: slideUp 0.3s ease-out;
    }
    
    .dash-modal-content {
      animation: slideDown 0.3s ease-out;
    }
    
    /* Card hover effects */
    .category-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .category-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.2);
      border-color: #8b5cf6;
    }
    
    /* Search highlight */
    .highlight {
      background-color: rgba(245, 158, 11, 0.3);
      color: white;
      padding: 0 2px;
      border-radius: 2px;
    }
    
    /* Scrollbar for modal */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }
    
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #8b5cf6;
      border-radius: 3px;
    }
    
    /* Better visibility for open icons */
    .open-indicator {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
      transition: all 0.2s ease;
    }
    
    .open-indicator:hover {
      background: rgba(139, 92, 246, 0.3);
      color: #c4b5fd;
    }
    
    /* Open button style for modal */
    .open-button {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      background: #8b5cf6;
      color: white;
      transition: all 0.2s ease;
    }
    
    .open-button:hover {
      background: #7c3aed;
      transform: translateY(-1px);
    }
    
    /* Loading spinner for dash modal */
    .loader {
      border: 3px solid #1e293b;
      border-radius: 50%;
      border-top: 3px solid #8b5cf6;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 2rem auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Dash modal specific styles - FULLSCREEN */
    .dash-modal {
      max-height: 100vh;
      max-width: 100vw;
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      border: none;
      background: rgba(37, 64, 128, 0.3); /* Make background semi-transparent */
    }

    
    .dash-modal-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0f172a;
      border-bottom: 1px solid #334155;
    }
    
    /* Fullscreen iframe */
    #dashIframe {
      width: 100%;
      height: calc(100vh - 80px);
      border: none;
      background: transparent; /* Make iframe background transparent */
      opacity: 0.5; /* Make iframe semi-transparent */
    }

    
    /* Hide main dashboard initially */
    #mainDashboard {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    
    /* Show only when dash is closed */
    #mainDashboard.visible {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
  </style>
</head>
<body class="text-gray-100 overflow-hidden">
  
  <!-- Main ViPeR Dashboard - HIDDEN BY DEFAULT -->
  <div id="mainDashboard" class="h-screen flex flex-col">
    
    <!-- Header - Fixed Height -->
    <div class="bg-slate-900/50 border-b border-slate-700/50 px-6 py-4">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-lg bg-purple-600 flex items-center justify-center">
            <i class="fas fa-bolt text-white"></i>
          </div>
          <div>
            <h1 class="text-2xl font-bold gradient-text">ViPeR Dashboard</h1>
            <p class="text-xs text-gray-400">Single-Page Access Control</p>
          </div>
        </div>
        
        <div class="flex items-center gap-4">
          <div class="hidden md:flex items-center gap-4 text-sm text-gray-400">
            <div class="px-3 py-1 rounded-full bg-slate-800">
              <i class="fas fa-folder mr-2"></i>
              <span id="totalCategories">6</span> categories
            </div>
            <div class="px-3 py-1 rounded-full bg-slate-800">
              <i class="fas fa-link mr-2"></i>
              <span id="totalLinks">80</span> links
            </div>
          </div>
          
        </div>
      </div>
      
      <!-- Search Bar -->
      <div class="mt-4 max-w-2xl">
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center">
            <i class="fas fa-search text-gray-500"></i>
          </div>
          <input 
            type="text" 
            id="searchInput" 
            placeholder="Search ALL links (titles & URLs)... (Press Ctrl+K)"
            class="w-full pl-12 pr-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none"
            autocomplete="off"
          />
          <div class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 text-sm hidden md:block">
            <span id="searchResults">0</span> matches
          </div>
        </div>
      </div>
    </div>
    
    <!-- Main Content - Fixed Height, No Scroll -->
    <div class="flex-1 overflow-hidden p-6">
      <div class="h-full">
        <!-- Categories Grid - Uses all available space -->
        <div id="dashboardLinks" class="h-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 overflow-hidden">
          <!-- Content will be loaded by JavaScript -->
        </div>
        
        <!-- Empty State -->
        <div id="emptyState" class="hidden h-full flex items-center justify-center">
          <div class="text-center">
            <div class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center mx-auto mb-4">
              <i class="fas fa-search text-gray-500 text-2xl"></i>
            </div>
            <h3 class="text-xl font-semibold text-gray-300 mb-2">No matches found</h3>
            <p class="text-gray-500 mb-4">Try different search terms</p>
            <button id="clearSearchBtn" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg">
              Clear Search
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Footer - Fixed Height -->
    <div class="bg-slate-900/50 border-t border-slate-700/50 px-6 py-3">
      <div class="flex justify-between items-center text-sm text-gray-400">
        <div>
          <span id="visibleCount">6</span> categories visible
        </div>
        <div class="flex items-center gap-4">
          <span class="text-xs hidden md:inline">Searching <span id="searchStats">80</span> total links</span>
          <span class="text-xs">ViPeR Protocol v2.0</span>
        </div>
      </div>
    </div>
  </div>



  <!-- Confirm Modal -->
  <div id="confirmModal" class="fixed inset-0 z-50 hidden modal-backdrop">
    <div class="absolute inset-0 bg-black/80" id="confirmModalBackdrop"></div>
    <div class="relative h-screen flex items-center justify-center p-4">
      <div class="modal-content bg-slate-800 rounded-xl w-full max-w-sm border border-slate-700 shadow-2xl p-6" id="confirmModalContent">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-lg bg-purple-600/20 flex items-center justify-center">
            <i class="fas fa-external-link-alt text-purple-400"></i>
          </div>
          <h3 class="text-lg font-bold text-white">Confirm Open</h3>
        </div>
        
        <p id="confirmMessage" class="text-gray-300 mb-6 text-sm"></p>
        
        <div class="flex justify-end gap-3">
          <button id="cancelConfirmBtn" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-gray-300 rounded-lg text-sm">
            Cancel
          </button>
          <button id="confirmActionBtn" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-sm font-medium">
            Open
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-lg transition-all duration-300 opacity-0 translate-y-4 z-40 border border-slate-700 text-sm">
    <div class="flex items-center gap-2">
      <i id="toastIcon" class="fas fa-check-circle"></i>
      <span id="toastMessage">Action completed</span>
    </div>
  </div>

<script src="/assets/outage/reqdata.js"></script>


<script>
    window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
        window.location.reload();
        }
    });
</script>
  <script src="/assets/js/security.js"></script>

</body>
</html>
