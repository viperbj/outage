<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/595/595067.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Searching Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0c0b10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #e2daf2;
      position: relative;
      overflow-x: hidden;
    }
    .bg-motion {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-motion span {
      position: absolute;
      width: 6px; height: 6px;
      background: rgba(180, 150, 230, 0.25);
      border-radius: 60px;
      box-shadow: 0 0 25px #b48eff;
      animation: rise 14s infinite ease-in-out;
      bottom: -10%;
    }
    .bg-motion span:nth-child(1) { left: 15%; width: 8px; height: 8px; animation-duration: 18s; animation-delay: 0s; opacity: 0.4; }
    .bg-motion span:nth-child(2) { left: 35%; width: 5px; height: 5px; animation-duration: 13s; animation-delay: 2s; opacity: 0.3; }
    .bg-motion span:nth-child(3) { left: 55%; width: 12px; height: 12px; animation-duration: 22s; animation-delay: 1s; opacity: 0.25; background: #a07ddf; }
    .bg-motion span:nth-child(4) { left: 75%; width: 7px; height: 7px; animation-duration: 16s; animation-delay: 0.5s; opacity: 0.4; }
    .bg-motion span:nth-child(5) { left: 90%; width: 9px; height: 9px; animation-duration: 20s; animation-delay: 3s; opacity: 0.3; background: #c7a6ff; }
    .bg-motion span:nth-child(6) { left: 8%; width: 11px; height: 11px; animation-duration: 25s; animation-delay: 1.2s; opacity: 0.2; }
    .bg-motion span:nth-child(7) { left: 45%; width: 6px; height: 6px; animation-duration: 19s; animation-delay: 2.5s; opacity: 0.35; }
    .bg-motion span:nth-child(8) { left: 68%; width: 14px; height: 14px; animation-duration: 28s; animation-delay: 0.2s; opacity: 0.2; background: #b692ff; }
    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 0.1; }
      50% { opacity: 0.5; transform: translateY(-60vh) scale(1.5); }
      100% { transform: translateY(-120vh) scale(0.8); opacity: 0; }
    }
    .bg-motion::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 200%; height: 100%;
      background: radial-gradient(circle at 30% 50%, rgba(100, 80, 160, 0.1), transparent 60%);
      animation: shift 30s infinite alternate linear;
      pointer-events: none;
    }
    @keyframes shift {
      0% { transform: translateX(-10%); }
      100% { transform: translateX(10%); }
    }
    .card {
      max-width: 760px;
      width: 100%;
      background: rgba(14, 12, 22, 0.8);
      backdrop-filter: blur(16px) saturate(200%);
      -webkit-backdrop-filter: blur(16px) saturate(200%);
      box-shadow: 0 30px 70px -15px #000000, inset 0 1px 2px rgba(255, 255, 255, 0.03), 0 0 0 1px rgba(180, 150, 240, 0.1);
      border-radius: 56px;
      padding: 3rem 2.5rem;
      text-align: center;
      border: 1px solid rgba(200, 170, 250, 0.08);
      position: relative;
      z-index: 10;
    }
    @media (min-width: 600px) { .card { padding: 4rem 4.5rem; } }
    .ghost-icon { font-size: 4rem; margin-bottom: 0.5rem; opacity: 0.9; filter: drop-shadow(0 0 15px #7b64b0); }
    .code {
      font-size: clamp(6rem, 22vw, 11rem); font-weight: 800; line-height: 1;
      background: linear-gradient(145deg, #dccdff, #a389e6, #9175c2);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 0 32px rgba(180, 130, 255, 0.5);
      margin-bottom: 0.2rem;
    }
    .glow-row {
      display: flex; align-items: center; justify-content: center; gap: 1.2rem;
      margin: 1.4rem 0 1.8rem 0;
    }
    .glow-row span {
      width: 10px; height: 10px; border-radius: 40px; background: #a688da;
      box-shadow: 0 0 22px #bf9aff; opacity: 0.8;
    }
    .glow-row span:nth-child(2) { width: 44px; background: #ddbbff; box-shadow: 0 0 40px #e3b6ff; }
    h1 {
      font-size: clamp(2rem, 5.6vw, 3rem); font-weight: 440;
      color: #e5daff; text-shadow: 0 2px 6px black, 0 0 28px #b194e6;
      margin-bottom: 1rem;
    }
    .description {
      font-size: 1.25rem; line-height: 1.7; color: #c2b5de;
      max-width: 460px; margin: 0 auto 2.8rem; font-weight: 340;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    }
    .button {
      display: inline-flex; align-items: center; justify-content: center;
      background: #1f1a2c; border: 1px solid #6f5b9e; padding: 1.1rem 3rem;
      border-radius: 100px; font-size: 1.25rem; font-weight: 500;
      text-decoration: none; color: #f0e6ff; gap: 12px;
      box-shadow: 0 0 25px #5d4a8b, 0 8px 18px #030103, inset 0 1px 2px #c1a6ff;
      backdrop-filter: blur(4px); transition: all 0.15s ease;
    }
    .button:hover {
      background: #312b48; border-color: #b594fc;
      box-shadow: 0 0 48px #aa86ff, 0 16px 30px #050109;
      transform: scale(1.02);
    }
    .button svg { width: 22px; height: 22px; fill: #f0e2ff; }
    .tiny-links {
      margin-top: 2.5rem; display: flex; gap: 2rem; justify-content: center;
      flex-wrap: wrap;
    }
    .tiny-links a {
      color: #9b8bbd; text-decoration: none; border-bottom: 1px dashed #564b70;
      padding-bottom: 4px; font-size: 1rem; transition: 0.15s;
    }
    .tiny-links a:hover { color: #e7d2ff; border-bottom-color: #b698fa; text-shadow: 0 0 8px #c29eff; }
    @media (max-width: 500px) {
      .card { padding: 2.5rem 1.5rem; }
      .button { padding: 1rem 2rem; font-size: 1.1rem; }
      .ghost-icon { font-size: 3.5rem; }
    }
    :focus-visible { outline: 3px solid #b38eff; outline-offset: 8px; border-radius: 60px; }
    ::selection { background: #5f4b8a; color: #f0e1ff; }
  </style>
</head>
<body>
  <div class="bg-motion" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  <main class="card" role="alert" aria-labelledby="static-heading">
    <div class="ghost-icon" aria-hidden="true">👻🌑</div>
    <div class="code" aria-hidden="true">404</div>
    <div class="glow-row" aria-hidden="true"><span></span><span></span><span></span></div>
    <h1 id="static-heading">lost in the void</h1>
    <div class="description">the page shimmered and faded.<br> but pathways flicker — let's guide you home.</div>
    <a href="/" class="button" aria-label="Return to homepage">
      <span>drift home</span>
      <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path d="M8 1 6.6 2.4 11.2 7H1v2h10.2l-4.6 4.6L8 15l7-7-7-7z"/></svg>
    </a>
    <div class="tiny-links"><a href="/">↻ go back</a><a href="#">report signal</a><a href="#">echo</a></div>
  </main>
</body>
</html>
